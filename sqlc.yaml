version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/"  # Point to entire migrations folder
    queries: "query.sql"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_pointers_for_null_types: true
