services:
  - type: web
    name: sqlc-demo
    env: go
    plan: free
    buildCommand: go build -o bin/api cmd/api/main.go
    startCommand: ./bin/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sqlc-demo-db
          property: connectionString
      - key: PORT
        value: 8080

databases:
  - name: sqlc-demo-db
    plan: free
